name: Deploy HERU.gg to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build_check:
        description: 'Skip build verification (deploy only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /var/www/heru.gg
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Verify the build passes before deploying
  # ─────────────────────────────────────────────
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build_check != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install backend dependencies
        run: cd backend && npm ci --production

      - name: Verify backend starts
        run: |
          cd backend
          timeout 10 node -e "
            import('./index.js').then(() => {
              console.log('Backend loaded OK');
              process.exit(0);
            }).catch(err => {
              console.error('Backend failed to load:', err.message);
              process.exit(1);
            });
          " || true

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Hostinger VPS via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [verify]
    if: always() && (needs.verify.result == 'success' || needs.verify.result == 'skipped')
    environment:
      name: production
      url: https://heru.gg

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -e

            echo ""
            echo "══════════════════════════════════════"
            echo "  HERU.gg — Starting Deployment"
            echo "  Commit: ${{ github.sha }}"
            echo "  Triggered by: ${{ github.actor }}"
            echo "══════════════════════════════════════"
            echo ""

            # Navigate to deployment directory
            cd ${{ env.DEPLOY_PATH }}

            # ── Pull latest code ──────────────────
            echo "[1/6] Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main
            echo "      ✓ Code updated"

            # ── Write environment files ───────────
            echo "[2/6] Writing environment variables..."

            # Frontend .env (Vite uses these at build time)
            cat > .env.production << 'ENVEOF'
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            ENVEOF

            # Backend .env
            cat > backend/.env << 'BACKENDENV'
            NODE_ENV=production
            PORT=3001
            SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            CORS_ORIGIN=https://heru.gg
            PAYMOB_API_KEY=${{ secrets.PAYMOB_API_KEY }}
            PAYMOB_INTEGRATION_ID=${{ secrets.PAYMOB_INTEGRATION_ID }}
            PAYMOB_IFRAME_ID=${{ secrets.PAYMOB_IFRAME_ID }}
            PAYMOB_HMAC_SECRET=${{ secrets.PAYMOB_HMAC_SECRET }}
            PAYMOB_ENABLED=${{ secrets.PAYMOB_ENABLED || 'false' }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            FROM_EMAIL=noreply@heru.gg
            PLATFORM_FEE_PERCENT=15
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            BACKENDENV

            echo "      ✓ Environment files written"

            # ── Install backend dependencies ──────
            echo "[3/6] Installing backend dependencies..."
            cd backend
            npm ci --production --silent
            cd ..
            echo "      ✓ Backend dependencies installed"

            # ── Build frontend ────────────────────
            echo "[4/6] Building frontend (Vite)..."
            npm ci --silent
            npm run build
            echo "      ✓ Frontend built → dist/"

            # ── Restart backend with PM2 ──────────
            echo "[5/6] Restarting backend..."
            if pm2 describe heru-backend > /dev/null 2>&1; then
              pm2 restart heru-backend --update-env
            else
              pm2 start ecosystem.config.cjs
            fi
            pm2 save
            echo "      ✓ Backend restarted"

            # ── Reload Nginx ──────────────────────
            echo "[6/6] Reloading Nginx..."
            sudo cp nginx/heru.gg.conf /etc/nginx/sites-available/heru.gg
            sudo ln -sf /etc/nginx/sites-available/heru.gg /etc/nginx/sites-enabled/heru.gg
            sudo nginx -t
            sudo systemctl reload nginx
            echo "      ✓ Nginx reloaded"

            echo ""
            echo "══════════════════════════════════════"
            echo "  Deployment complete!"
            echo "  https://heru.gg"
            echo "══════════════════════════════════════"
            echo ""

            pm2 status

  # ─────────────────────────────────────────────
  # JOB 3: Health check after deploy
  # ─────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()

    steps:
      - name: Wait for services to stabilize
        run: sleep 15

      - name: Check frontend is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://heru.gg || echo "000")
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
            echo "WARNING: Frontend returned $STATUS — check VPS logs"
          else
            echo "✓ Frontend is reachable"
          fi

      - name: Check API health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://heru.gg/api/health || echo "000")
          echo "API health status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ API is healthy"
          else
            echo "WARNING: API returned $STATUS — check PM2 logs"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://heru.gg |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# HERU.gg Nginx Configuration
# =============================================================================
# USAGE:
#   1. Copy to /etc/nginx/sites-available/heru.gg
#   2. Symlink: ln -sf /etc/nginx/sites-available/heru.gg /etc/nginx/sites-enabled/
#   3. Get SSL: certbot --nginx -d heru.gg -d www.heru.gg
#   4. Test: nginx -t && systemctl reload nginx
#
# If SSL certs don't exist yet, this config serves on port 80 only.
# After running certbot, uncomment the SSL block below.
# =============================================================================

# HTTP server — works immediately, no SSL needed
server {
    listen 80;
    server_name heru.gg www.heru.gg _;

    # Frontend (Vite build output)
    root /var/www/heru.gg/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # API proxy to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}


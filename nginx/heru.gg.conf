# =============================================================================
# HERU.gg Nginx Configuration — Production Hardened
# =============================================================================
# SETUP:
#   1. sudo cp nginx/heru.gg.conf /etc/nginx/sites-available/heru.gg
#   2. sudo ln -sf /etc/nginx/sites-available/heru.gg /etc/nginx/sites-enabled/heru.gg
#   3. sudo rm -f /etc/nginx/sites-enabled/default
#   4. sudo certbot --nginx -d heru.gg -d www.heru.gg
#   5. sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Hide Nginx version from all responses
server_tokens off;

# Rate limiting zones (must be in http block; include this file from nginx.conf or
# place these in /etc/nginx/conf.d/heru-rate-limits.conf if needed)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=10r/m;

# -----------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# -----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name heru.gg www.heru.gg;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------
# HTTPS — primary server
# -----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name heru.gg www.heru.gg;

    # ------------------------------------------------------------------
    # SSL — cert managed by Certbot
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/heru.gg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heru.gg/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Modern SSL — TLS 1.2 and 1.3 only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/heru.gg/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://*.supabase.in; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://accept.paymob.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Strip identifying headers from proxied responses
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml font/woff font/woff2;

    # ------------------------------------------------------------------
    # Frontend static files
    # ------------------------------------------------------------------
    root /var/www/heru.gg/dist;
    index index.html;

    # Hashed assets (Vite adds content hash) — cache 1 year
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # Block common attack and sensitive paths
    # ------------------------------------------------------------------
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.sh|\.bash|wp-admin|phpmyadmin|xmlrpc) {
        deny all;
        return 404;
    }

    # Block access to hidden files (.env, .git, .htaccess etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # ------------------------------------------------------------------
    # API proxy — auth endpoints (very strict: 5 req/min)
    # ------------------------------------------------------------------
    location ~ ^/api/auth/(login|staff/login|register) {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        client_max_body_size 1M;
    }

    # Upload endpoint — relaxed body size
    location /api/upload {
        limit_req zone=api_upload burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    # Paymob webhook — no IP restriction here, HMAC verified in backend
    location /api/payments/paymob/callback {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        client_max_body_size 1M;
    }

    # All other API routes (60 req/min)
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }

    # ------------------------------------------------------------------
    # SPA fallback — all routes handled by React Router
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
